<!DOCTYPE html>
<html>
<head><title>Auth Callback</title></head>
<body>
<h1>Auth Code</h1>
<p id="code" style="font-size:18px;word-break:break-all;background:#eee;padding:10px;"></p>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
document.getElementById('code').textContent = code || 'No code found';
</script>
</body>
</html>
